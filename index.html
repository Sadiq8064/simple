<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Tags Example</title>

    <style>
        version,
        devmessagestatus,
        meesage {
            display: block;
            margin: 10px 0;
            font-size: 20px;
            font-family: Arial, sans-serif;
        }

        devmessagestatus {
            color: blue;
            font-weight: bold;
        }

        meesage {
            color: darkgreen;
        }
    </style>
</head>
<body>

    <version>5.0.32</version>

    <devmessagestatus>OFF</devmessagestatus>

    <meesage>Welcome to SmartBVB. Turn on notifications by tapping the profile photo and allowing notifications.</meesage>
</body>
</html>
