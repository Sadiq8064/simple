<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Tags Example</title>

    <style>
        version,
        devmessagestatus,
        calenderlink,
        calenderid,
        minor1,
        minor2,
        esa,
        meesage {
            display: block;
            margin: 10px 0;
            font-size: 20px;
            font-family: Arial, sans-serif;
        }

        devmessagestatus {
            color: blue;
            font-weight: bold;
        }

        meesage {
            color: darkgreen;
        }
    </style>
</head>
<body>

    <version>5.0.32</version>

    <devmessagestatus>ON</devmessagestatus>

    <meesage>Welcome to SmartBVB. Turn on notifications by tapping the profile photo and allowing notifications.</meesage>
    <calenderid>1.0.0</calenderid>
    <calenderlink>https://drive.google.com/file/d/1GNC7aXMbCjgBjFHWb33TfEKuyIg5HLw-/view?usp=drivesdk</calenderlink>

    <minor1>March 26</minor1>
    <minor2>May 18</minor2>
    <esa>june 12</esa>
</body>
</html>
